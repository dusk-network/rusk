on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

name: Rusk CI

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # JOB to run change detection
  changes:
    runs-on: core
    # Required permissions
    permissions:
      pull-requests: read
    # Set job outputs to values from filter step
    outputs:
      run-ci: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.run-ci }}
    steps:
      # For pull requests it's not necessary to checkout the code
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            run-ci:
              - '!(w3sper.js/**/*|.github/workflows/w3sperjs_ci.yml)'

  analyze:
    needs: changes
    if: needs.changes.outputs.run-ci == 'true'
    name: Dusk Analyzer
    uses: dusk-network/.github/.github/workflows/dusk-analysis.yml@main

  fmt:
    needs: changes
    if: needs.changes.outputs.run-ci == 'true'

    name: Rustfmt
    runs-on: core
    steps:
      # NOTE: Our self-hosted runner performs periodic cleanup under
      # `/home/docker/actions-runner/_work` (including `_actions`), which can
      # break `uses: actions/checkout` post-steps mid-job. Do a manual checkout
      # outside that directory.
      - name: Prepare sources
        shell: bash
        run: |
          set -euo pipefail

          WORKDIR_BASE="/var/opt/build-cache/ci"
          WORKDIR="${WORKDIR_BASE}/${GITHUB_RUN_ID}-${GITHUB_JOB}"
          echo "WORKDIR=${WORKDIR}" >> "$GITHUB_ENV"

          rm -rf "$WORKDIR"
          mkdir -p "$WORKDIR"

          REPO_URL="https://x-access-token:${{ secrets.PLONK_PRIVATE_READ_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git"
          git clone "$REPO_URL" "$WORKDIR/repo"

          cd "$WORKDIR/repo"
          if [ -n "${GITHUB_REF:-}" ]; then
            git fetch origin "+${GITHUB_REF}:ci_ref"
            git checkout ci_ref
          else
            git checkout "${GITHUB_SHA}"
          fi

      - name: Add Rust tools to PATH
        shell: bash
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rust-src rustfmt clippy
          rustup target add wasm32-unknown-unknown

      - name: Rustfmt check
        shell: bash
        working-directory: ${{ env.WORKDIR }}/repo
        run: cargo fmt --all -- --check

      - name: Cleanup
        if: always()
        shell: bash
        run: rm -rf "${WORKDIR:-}" || true

  clippy_check:
    needs: changes
    if: needs.changes.outputs.run-ci == 'true' && (github.event.pull_request.draft == false || github.event_name == 'workflow_dispatch')
    name: Clippy check release
    runs-on: core
    env:
      RUSK_PROFILE_PATH: "/var/opt/build-cache"
      RUSTC_WRAPPER: ""
      RUSTC_WORKSPACE_WRAPPER: ""
    steps:
      - name: Prepare sources
        shell: bash
        run: |
          set -euo pipefail

          WORKDIR_BASE="${RUSK_PROFILE_PATH}/ci"
          WORKDIR="${WORKDIR_BASE}/${GITHUB_RUN_ID}-${GITHUB_JOB}"
          echo "WORKDIR=${WORKDIR}" >> "$GITHUB_ENV"

          rm -rf "$WORKDIR"
          mkdir -p "$WORKDIR"

          REPO_URL="https://x-access-token:${{ secrets.PLONK_PRIVATE_READ_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git"
          git clone "$REPO_URL" "$WORKDIR/repo"

          cd "$WORKDIR/repo"
          if [ -n "${GITHUB_REF:-}" ]; then
            git fetch origin "+${GITHUB_REF}:ci_ref"
            git checkout ci_ref
          else
            git checkout "${GITHUB_SHA}"
          fi

      - name: Add Rust tools to PATH
        shell: bash
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rust-src rustfmt clippy
          rustup target add wasm32-unknown-unknown
      - name: Configure git auth for private dependencies
        shell: bash
        run: |
          set -euo pipefail
          # Self-hosted runners share $HOME between jobs, which can leave stale
          # `url.*.insteadOf` entries behind. Isolate the global git config per
          # job to ensure the expected token is used.
          export GIT_CONFIG_GLOBAL="${WORKDIR}/.gitconfig"
          echo "GIT_CONFIG_GLOBAL=${GIT_CONFIG_GLOBAL}" >> "$GITHUB_ENV"
          git config --global url."https://x-access-token:${{ secrets.PLONK_PRIVATE_READ_TOKEN }}@github.com/".insteadOf "https://github.com/"
      - name: Run clippy
        working-directory: ${{ env.WORKDIR }}/repo
        run: make clippy
      - name: sccache stats
        if: always()
        run: sccache -s || true
      - name: Cleanup
        if: always()
        shell: bash
        run: rm -rf "${WORKDIR:-}" || true

  test_nightly:
    needs: changes
    if: needs.changes.outputs.run-ci == 'true' && (github.event.pull_request.draft == false || github.event_name == 'workflow_dispatch')
    name: Nightly tests
    runs-on: core
    env:
      RUSK_MINIMUM_BLOCK_TIME: 1
      RUSTC_WRAPPER: ""
      RUSTC_WORKSPACE_WRAPPER: ""
    steps:
      - name: Prepare sources
        shell: bash
        run: |
          set -euo pipefail

          WORKDIR_BASE="/var/opt/build-cache/ci"
          WORKDIR="${WORKDIR_BASE}/${GITHUB_RUN_ID}-${GITHUB_JOB}"
          echo "WORKDIR=${WORKDIR}" >> "$GITHUB_ENV"

          rm -rf "$WORKDIR"
          mkdir -p "$WORKDIR"

          REPO_URL="https://x-access-token:${{ secrets.PLONK_PRIVATE_READ_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git"
          git clone "$REPO_URL" "$WORKDIR/repo"

          cd "$WORKDIR/repo"
          if [ -n "${GITHUB_REF:-}" ]; then
            git fetch origin "+${GITHUB_REF}:ci_ref"
            git checkout ci_ref
          else
            git checkout "${GITHUB_SHA}"
          fi

      - name: Add Rust tools to PATH
        shell: bash
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rust-src rustfmt clippy
          rustup target add wasm32-unknown-unknown
      - name: Configure git auth for private dependencies
        shell: bash
        run: |
          set -euo pipefail
          # Self-hosted runners share $HOME between jobs, which can leave stale
          # `url.*.insteadOf` entries behind. Isolate the global git config per
          # job to ensure the expected token is used.
          export GIT_CONFIG_GLOBAL="${WORKDIR}/.gitconfig"
          echo "GIT_CONFIG_GLOBAL=${GIT_CONFIG_GLOBAL}" >> "$GITHUB_ENV"
          git config --global url."https://x-access-token:${{ secrets.PLONK_PRIVATE_READ_TOKEN }}@github.com/".insteadOf "https://github.com/"
      - name: Run tests
        working-directory: ${{ env.WORKDIR }}/repo
        run: make test
      - name: sccache stats
        if: always()
        run: sccache -s || true
      - name: Cleanup
        if: always()
        shell: bash
        run: rm -rf "${WORKDIR:-}" || true
