on: [workflow_dispatch]

name: Generate All Keys

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache .rusk profile
        uses: actions/cache@v4
        env:
          cache-name: cache-rusk-profile-v2
        with:
          path: ${{ github.workspace }}/.rusk
          key: ${{ runner.os }}-build-${{ env.cache-name }}
          restore-keys: ${{ runner.os }}-build-${{ env.cache-name }}

      - uses: dsherret/rust-toolchain-file@v1
      - name: Configure git auth for private dependencies
        run: git config --global url."https://x-access-token:${{ secrets.PLONK_PRIVATE_READ_TOKEN }}@github.com/".insteadOf "https://github.com/"
      - run: RUSK_PROFILE_PATH=$GITHUB_WORKSPACE/.rusk make keys
