[workspace]
members = [
    "circuits/bid",
    "circuits/blindbid",
    "circuits/transfer",
    "contracts/bid",
    "contracts/transfer",
    "macros/code-hasher",
    "rusk-profile",
    "rusk-abi",
    "rusk",
]
resolver = "2"

[profile.dev.build-override]
opt-level = 3
debug = false
debug-assertions = false
overflow-checks = false
incremental = false
codegen-units = 16

[profile.release.build-override]
opt-level = 3
debug = false
debug-assertions = false
overflow-checks = false
incremental = false
codegen-units = 16

[patch.crates-io]
phoenix-core = { git= "https://github.com/dusk-network/phoenix-core",branch = "from_err_impl", features = ["canon"], default-features = false }
dusk-blindbid = { git ="https://github.com/dusk-network/dusk-blindbid", branch = "from_message", default-features = false, features = ["canon"] }
